name: test_app
description: "Test App – Bluetooth microcontroller connector test application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^1.31.15
  permission_handler: ^11.3.1
  flutter_bluetooth_serial: ^0.4.0
  google_fonts: ^8.0.2
  device_info_plus: ^11.3.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/test_app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/test_app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/StartingScreen.png
    - assets/test_app_logo.png
